name: GiTa
options:
  bundleIdPrefix: lismin.gita
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  defaultConfig: Debug
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: GiTa/Info.plist
    SUPPORTED_INTERFACE_ORIENTATIONS: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    SUPPORTED_INTERFACE_ORIENTATIONS~ipad: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

targets:
  GiTa:
    type: application
    platform: iOS
    sources:
      - path: GiTa
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: lismin.gita
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QTD33HXD54
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: GiTa/Info.plist

